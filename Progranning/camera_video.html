<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Camera</title>
  </head>
  <body>
        <label for="photo">Take a Photo:</label>
        <input type="file" id="photo" accept="image/*" capture="user">

        <label for="video">Record a Video:</label>
        <input type="file" id="video" accept="video/*" capture="environment">
<!-- accept: Tells the browser what file types are allowed capture="user": Requests the front-facing (selfie) camera capture="environment": Requests the rear-facing camera
-->

    
  </body>
</html>

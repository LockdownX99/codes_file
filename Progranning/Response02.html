<!DOCTYPE html>
<html lang="en">
<head> 
  <title>response</title>
  <script>
  function hello(){
    if(document.querySelector("h1").innerHTML==="hello!"){document.querySelector("h1").innerHTML="Good bye!";}
    else{
      document.querySelector("h1").innerHTML = "hello!";
    }
    
  }  
    
  </script>
</head>
<body>
  <h1>hell!</h1>
  <button onclick="hello()">click here</button>
</body>
</html>

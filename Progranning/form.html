<!DOCTYPE html>
<html lang="en">
<head>
  <title>Form</title>
</head>
<body>
  <form>
    <div>
    <input name="name" type="text" placeholder="Full Name" id="user_name"/>
    <input name="password" type="password" placeholder="Password" id="Password"/>
    <input type="submit" id="submit_btn"/>
    </div>
   <div>
    Favorite color ? 
    <input name="color" type="radio" value="red"/>Red
    <input name="color" type="radio" value="Green"/>Green
    <input name="color" type="radio" value="blue"/>Blue
    <input name="color" type="radio" value="black"/>Black
    <input name="color" type="radio" value="white"/>White
   </div> 
   <div>
    <input name="country" list="countries" placeholder="Country" id="#"/>
    <datalist id="countries">
      <option value="afganistan">
      <option value="azarbaizan">
      <option value="agafa">
      
    </datalist>
   </div>
  </form>
</body>
</html>
